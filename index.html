<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MDT N.O.O.S.E. - Dispatch System</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body class="app-body">
    <div id="header-placeholder"></div>
    <div class="container mdt-container">
      <div class="header-top">
        <div class="title-section">
          <h3>N.O.O.S.E. — GESTION DES DÉPLOIEMENTS</h3>
          <h1>MDT <span>Dispatch</span></h1>
          <p>
            Patrouilles actives :
            <strong id="active-count" style="color: var(--accent-orange)"
              >0</strong
            >
            • Alerte :
            <strong id="global-security" style="color: var(--accent-gold)"
              >DEFCON 5</strong
            >
          </p>
        </div>
      </div>

      <div class="main-layout">
        <div class="grid-section" id="patrol-grid"></div>

        <div class="sidebar-section">
          <div class="panel-box">
            <div class="panel-title">DÉPLOYER PATROUILLE</div>

            <div class="form-group">
              <label>Assigner Agents</label>
              <div
                id="selected-agents-container"
                class="tags-container"
                style="margin-bottom: 0.8rem"
              ></div>
              <input
                type="text"
                id="agent-search"
                class="form-control"
                placeholder="Matricule ou nom..."
                autocomplete="off"
              />
              <div id="search-results" class="search-results"></div>
            </div>

            <div
              style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem"
            >
              <div class="form-group">
                <label>Fréq. Radio</label>
                <input
                  type="number"
                  id="radio-freq"
                  class="form-control"
                  value="65"
                />
              </div>
              <div class="form-group">
                <label>Sécurité</label>
                <select id="security-level" class="form-control">
                  <option value="Renforcé 1">Renforcé 1</option>
                  <option value="Renforcé 2">Renforcé 2</option>
                  <option value="Renforcé 3">Renforcé 3</option>
                  <option value="DEFCON 5" selected>DEFCON 5</option>
                  <option value="DEFCON 4">DEFCON 4</option>
                  <option value="DEFCON 3">DEFCON 3</option>
                  <option value="DEFCON 2">DEFCON 2</option>
                  <option value="DEFCON 1">DEFCON 1</option>
                </select>
              </div>
            </div>
            <button class="btn-submit" onclick="createPatrol()">
              CRÉER LA PATROUILLE
            </button>
          </div>
        </div>
      </div>

      <div class="history-section">
        <div class="panel-title">ARCHIVES RÉCENTES</div>
        <table class="history-table">
          <thead>
            <tr>
              <th>Effectifs</th>
              <th>Création</th>
              <th>Clôture</th>
              <th>Intervention</th>
              <th>Rapport</th>
            </tr>
          </thead>
          <tbody id="history-log"></tbody>
        </table>
      </div>
    </div>

    <!-- MODAL EDITION -->
    <div id="edit-modal" class="modal">
      <div class="modal-content" style="width: 400px">
        <div class="panel-title">
          MODIFIER <span id="edit-modal-title-type"></span>
          <span
            id="edit-unit-display"
            style="color: var(--accent-orange); margin-left: 5px"
          ></span>
        </div>
        <div id="edit-status-group" class="form-group" style="display: none">
          <label>Nouveau Statut</label>
          <select id="edit-status" class="form-control">
            <option value="Disponible">Disponible</option>
            <option value="Intervention">Intervention</option>
            <option value="Procédure">Procédure</option>
            <option value="Indisponible">Indisponible</option>
          </select>
        </div>
        <div id="edit-radio-group" class="form-group" style="display: none">
          <label>Nouvelle Fréq. Radio (MHz)</label>
          <input type="number" id="edit-radio" class="form-control" />
        </div>
        <div style="display: flex; gap: 1rem; margin-top: 1.5rem">
          <button class="btn-submit" onclick="saveEdit()">SAUVEGARDER</button>
          <button
            class="btn-danger"
            style="margin-top: 0; padding: 1rem"
            onclick="closeEditModal()"
          >
            ANNULER
          </button>
        </div>
      </div>
    </div>

    <!-- MODAL CLOTURE -->
    <div id="close-modal" class="modal">
      <div class="modal-content">
        <div class="panel-title">CLÔTURE DE PATROUILLE</div>
        <div class="form-group">
          <label>Intervention effectuée ?</label>
          <select id="intervention-confirm" class="form-control">
            <option value="Non">Non</option>
            <option value="Oui">Oui</option>
          </select>
        </div>
        <div class="form-group">
          <label>Rapport d'intervention</label>
          <textarea
            id="patrol-report"
            class="form-control"
            rows="5"
            placeholder="Saisir les détails de la patrouille..."
          ></textarea>
        </div>
        <div style="display: flex; gap: 1rem">
          <button class="btn-submit" onclick="archivePatrol()">Terminer</button>
          <button
            class="btn-danger"
            style="margin-top: 0; padding: 1rem"
            onclick="closeModal()"
          >
            ANNULER
          </button>
        </div>
      </div>
    </div>

    <!-- MODAL SPECIALITE -->
    <div id="specialty-modal" class="modal">
      <div class="modal-content" style="width: 400px">
        <div class="panel-title">
          ASSIGNER SPÉCIALITÉ
          <span
            id="spec-agent-name"
            style="color: var(--accent-orange); margin-left: 5px"
          ></span>
        </div>
        <div class="form-group">
          <label>Spécialité</label>
          <select id="spec-select" class="form-control">
            <option value="">Aucune</option>
            <option value="EOD">EOD</option>
            <option value="Breacher">Breacher</option>
          </select>
        </div>
        <div style="display: flex; gap: 1rem">
          <button class="btn-submit" onclick="saveSpecialty()">
            APPLIQUER
          </button>
          <button
            class="btn-danger"
            style="margin-top: 0; padding: 1rem"
            onclick="closeSpecialtyModal()"
          >
            ANNULER
          </button>
        </div>
      </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      // ═══════════════════════════════════════════════
      //  SUPABASE CLIENT
      // ═══════════════════════════════════════════════
      const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY,
      );

      // ═══════════════════════════════════════════════
      //  ÉTAT LOCAL
      // ═══════════════════════════════════════════════
      let roster = []; // agents chargés depuis la DB
      let activePatrols = []; // patrouilles en cours (chargées + créées localement)
      let archive = []; // historique chargé depuis la DB

      let selectedAgents = [];
      let currentClosingId = null;
      let currentEditId = null;
      let currentEditType = null;
      let currentSpecPatrolId = null;
      let currentSpecAgentId = null;

      const sep = `<span style="position: relative; top: -1px; opacity: 0.5; margin: 0 4px;">|</span>`;

      // ═══════════════════════════════════════════════
      //  CHARGEMENT DEPUIS LA BASE DE DONNÉES
      // ═══════════════════════════════════════════════

      async function loadRoster() {
        const { data, error } = await supabaseClient
          .from("agents")
          .select(`*, grades(*)`)
          .order("grade_id", { ascending: false });

        if (error) {
          console.error("Erreur chargement roster :", error.message);
          return;
        }

        roster = data.map((a) => ({
          id: a.id,
          name: a.nom,
          matricule: a.matricule,
          specialite_defaut: a.specialite_defaut,
          grade: {
            class: a.grades.classe_css,
            weight: a.grades.poids,
            diminutif: a.grades.diminutif,
          },
        }));
      }

      async function loadActivePatrols() {
        const { data, error } = await supabaseClient
          .from("patrouilles")
          .select(
            `
      *,
      patrouille_agents(
        specialite_active,
        agents(id, matricule, nom, specialite_defaut, grades(nom, diminutif, poids, classe_css))
      )
    `,
          )
          .is("date_cloture", null)
          .order("aujourd_hui", { ascending: true });

        if (error) {
          console.error(
            "Erreur chargement patrouilles actives :",
            error.message,
          );
          return;
        }
        activePatrols = data
          .filter((p) => p.patrouille_agents && p.patrouille_agents.length > 0)
          .map((p) => dbPatrolToLocal(p));
      }

      async function loadHistory() {
        const { data, error } = await supabaseClient
          .from("patrouilles")
          .select(
            `
            *,
            patrouille_agents(
              specialite_active,
              agents(id, matricule, nom, grades(nom, diminutif, poids, classe_css))
            )
          `,
          )
          .not("date_cloture", "is", null)
          .order("date_cloture", { ascending: false })
          .limit(10);

        if (error) {
          console.error("Erreur chargement historique :", error.message);
          return;
        }

        archive = data.map((p) => {
          const local = dbPatrolToLocal(p);
          const endDate = p.date_cloture ? new Date(p.date_cloture) : null;
          return {
            ...local,
            endDate: endDate
              ? endDate.toLocaleDateString("fr-FR") +
                " - " +
                endDate.toLocaleTimeString("fr-FR", {
                  hour: "2-digit",
                  minute: "2-digit",
                })
              : "—",
            report: p.rapport,
            intervention: p.intervention_effectuee ? "Oui" : "Non",
          };
        });
      }

      // ── Transforme un enregistrement DB en objet local ──
      function dbPatrolToLocal(p) {
        const agents = (p.patrouille_agents || []).map((pa) => ({
          id: pa.agents.id,
          name: pa.agents.nom,
          matricule: pa.agents.matricule,
          specialite_defaut: pa.agents.specialite_defaut,
          grade: {
            class: pa.agents.grades.classe_css,
            weight: pa.agents.grades.poids,
          },
          specialty: pa.specialite_active,
        }));

        const supervisor =
          agents.find((a) => a.id === p.superviseur_id) ||
          determineSupervisor(agents);
        const startDate = p.aujourd_hui ? new Date(p.aujourd_hui) : new Date();

        return {
          id: p.id,
          date:
            startDate.toLocaleDateString("fr-FR") +
            " - " +
            startDate.toLocaleTimeString("fr-FR", {
              hour: "2-digit",
              minute: "2-digit",
            }),
          agents,
          supervisor,
          radio: p.frequence_radio,
          security: p.niveau_securite,
          status: p.statut,
        };
      }

      // ═══════════════════════════════════════════════
      //  RECHERCHE D'AGENTS
      // ═══════════════════════════════════════════════

      const searchInput = document.getElementById("agent-search");
      const searchResults = document.getElementById("search-results");
      const selectedContainer = document.getElementById(
        "selected-agents-container",
      );

      searchInput.addEventListener("input", function () {
        const query = this.value.toLowerCase();
        searchResults.innerHTML = "";

        if (query.length === 0) {
          searchResults.style.display = "none";
          return;
        }

        const busyAgentIds = new Set(
          activePatrols.flatMap((p) => p.agents.map((a) => a.id)),
        );
        const selectedIds = new Set(selectedAgents.map((a) => a.id));

        let filtered = roster.filter(
          (a) =>
            (a.name.toLowerCase().includes(query) ||
              a.matricule.includes(query)) &&
            !selectedIds.has(a.id) &&
            !busyAgentIds.has(a.id),
        );

        if (filtered.length > 0) {
          filtered.sort(
            (a, b) =>
              b.grade.weight - a.grade.weight || a.name.localeCompare(b.name),
          );
          searchResults.style.display = "block";
          filtered.forEach((agent) => {
            const div = document.createElement("div");
            div.className = "search-item";
            div.innerHTML = `<span class="tag ${agent.grade.class}">${agent.matricule} | ${agent.name}</span>`;
            div.onclick = () => addAgent(agent);
            searchResults.appendChild(div);
          });
        } else {
          searchResults.style.display = "none";
        }
      });

      searchInput.addEventListener("keydown", function (e) {
        if (
          e.key === "Tab" &&
          searchResults.style.display === "block" &&
          searchResults.firstElementChild
        ) {
          e.preventDefault();
          searchResults.firstElementChild.click();
        }
      });

      function addAgent(agent) {
        selectedAgents.push(agent);
        searchInput.value = "";
        searchResults.style.display = "none";
        renderSelectedAgents();
      }

      function removeAgent(id) {
        selectedAgents = selectedAgents.filter((a) => a.id !== id);
        renderSelectedAgents();
      }

      function renderSelectedAgents() {
        selectedContainer.innerHTML = "";
        selectedAgents.forEach((agent) => {
          const tag = document.createElement("div");
          tag.className = `tag ${agent.grade.class}`;
          tag.innerHTML = `${agent.matricule} | ${agent.name} <span class="tag-remove" onclick="removeAgent(${agent.id})">&times;</span>`;
          selectedContainer.appendChild(tag);
        });
      }

      // ═══════════════════════════════════════════════
      //  CRÉATION DE PATROUILLE
      // ═══════════════════════════════════════════════

      async function createPatrol() {
        if (selectedAgents.length === 0) return;

        const submitBtn = document.querySelector(
          'button[onclick="createPatrol()"]',
        );
        if (submitBtn.disabled) return;

        const originalText = submitBtn.textContent;
        submitBtn.disabled = true;
        submitBtn.textContent = "CRÉATION EN COURS...";
        submitBtn.style.opacity = "0.5";
        submitBtn.style.cursor = "wait";

        try {
          const patrolAgents = selectedAgents.map((a) => ({
            ...a,
            specialty: a.specialite_defaut || null,
          }));

          const supervisor = determineSupervisor(patrolAgents);
          const now = new Date();
          const dateStr =
            now.toLocaleDateString("fr-FR") +
            " - " +
            now.toLocaleTimeString("fr-FR", {
              hour: "2-digit",
              minute: "2-digit",
            });

          const { data: patrolData, error: patrolError } = await supabaseClient
            .from("patrouilles")
            .insert({
              superviseur_id: supervisor.id,
              frequence_radio:
                parseInt(document.getElementById("radio-freq").value) || 65,
              niveau_securite: document.getElementById("security-level").value,
              statut: "Disponible",
            })
            .select()
            .single();

          if (patrolError) return;

          const agentRows = patrolAgents.map((a) => ({
            patrouille_id: patrolData.id,
            agent_id: a.id,
            specialite_active: a.specialty,
          }));

          await supabaseClient.from("patrouille_agents").insert(agentRows);

          activePatrols.push({
            id: patrolData.id,
            date: dateStr,
            agents: patrolAgents,
            supervisor: supervisor,
            radio: document.getElementById("radio-freq").value,
            security: document.getElementById("security-level").value,
            status: "Disponible",
          });

          selectedAgents = [];
          renderSelectedAgents();
          updateUI();
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
          submitBtn.style.opacity = "1";
          submitBtn.style.cursor = "pointer";
        }
      }

      function determineSupervisor(agents) {
        const maxWeight = Math.max(...agents.map((a) => a.grade.weight));
        return agents.filter((a) => a.grade.weight === maxWeight)[0];
      }

      // ═══════════════════════════════════════════════
      //  RENDU DES PATROUILLES ACTIVES
      // ═══════════════════════════════════════════════

      function updateUI() {
        const grid = document.getElementById("patrol-grid");
        grid.innerHTML = "";

        if (activePatrols.length === 0) {
          grid.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">📡</div>
              <div style="font-weight: 600; color: var(--text-main); margin-bottom: 0.5rem; letter-spacing: 1px;">AUCUNE PATROUILLE DÉPLOYÉE</div>
              <div style="font-size: 0.85rem;">Utilisez le panneau latéral pour créer une nouvelle patrouille.</div>
            </div>`;
        } else {
          activePatrols.forEach((patrol) => {
            const card = document.createElement("div");
            card.className = "unit-card";

            let agentsHtml = patrol.agents
              .map((a) => {
                const isSup = a.id === patrol.supervisor.id;
                const supIcon = isSup
                  ? '<span style="margin-right:4px; opacity:0.8;">★</span>'
                  : "";
                return `<div class="tag ${a.grade.class} agent-tag-clickable" onclick="openSpecialtyModal(${patrol.id}, ${a.id})" title="Modifier la spécialité">
                ${supIcon}${a.matricule} | ${a.name} ${specialtyBadge(a.specialty)}
              </div>`;
              })
              .join("");

            let statusColor = "#10b981";
            if (patrol.status === "Intervention") statusColor = "#8b3fe0";
            if (patrol.status === "Procédure") statusColor = "#f59e0b";
            if (patrol.status === "Indisponible") statusColor = "#ef4444";

            card.innerHTML = `
              <div class="unit-header">
                <div>
                  <span class="unit-name">
                    <img src="img/logo.png" class="unit-card-logo" alt="logo">
                    PATROUILLE N.O.O.S.E.
                    <img src="img/logo.png" class="unit-card-logo" alt="logo">
                  </span>
                  <span class="dash" style="margin-left: 8px;">${patrol.date}</span>
                </div>
              </div>
              <div>
                <div style="font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.6rem; letter-spacing: 1px;">Superviseur</div>
                <div class="tag ${patrol.supervisor.grade.class} agent-tag-clickable" onclick="openSpecialtyModal(${patrol.id}, ${patrol.supervisor.id})" title="Modifier la spécialité">
                  <span style="margin-right:4px; opacity:0.8;">★</span>${patrol.supervisor.matricule} ${sep} ${patrol.supervisor.name} ${specialtyBadge(patrol.supervisor.specialty)}
                </div>
              </div>
              <div>
                <div style="font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.6rem; letter-spacing: 1px;">Effectifs</div>
                <div class="tags-container">${agentsHtml}</div>
              </div>
              <div style="display: flex; gap: 1rem; align-items: center; margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                <div class="editable-field" onclick="openEditField(${patrol.id}, 'radio')" title="Modifier la fréquence">
                  <span style="font-size: 0.8rem; color: var(--text-muted);">Radio:</span>
                  <strong style="color: var(--text-main); font-size: 0.85rem;">${patrol.radio} MHz</strong>
                </div>
                <div class="editable-field" style="margin-left: auto;" onclick="openEditField(${patrol.id}, 'status')" title="Modifier le statut">
                  <span style="font-size: 0.8rem; color: var(--text-muted);">Statut:</span>
                  <strong style="color: ${statusColor}; font-size: 0.85rem;">${patrol.status}</strong>
                </div>
              </div>
              <button class="btn-danger" style="margin-top: 1rem;" onclick="openCloseModal(${patrol.id})">TERMINER PATROUILLE</button>`;

            grid.appendChild(card);
          });
        }

        document.getElementById("active-count").textContent =
          activePatrols.length;
        document.getElementById("global-security").textContent =
          activePatrols.length > 0
            ? activePatrols[activePatrols.length - 1].security
            : "DEFCON 5";
      }

      function specialtyBadge(spec) {
        if (spec === "Medic")
          return '<span class="spec-badge spec-medic">Medic</span>';
        if (spec === "EOD")
          return '<span class="spec-badge spec-eod">EOD</span>';
        if (spec === "Breacher")
          return '<span class="spec-badge spec-breacher">Breacher</span>';
        return "";
      }

      // ═══════════════════════════════════════════════
      //  MODIFICATION STATUT / RADIO
      // ═══════════════════════════════════════════════

      function openEditField(id, type) {
        currentEditId = id;
        currentEditType = type;
        const patrol = activePatrols.find((p) => p.id === id);
        if (!patrol) return;

        document.getElementById("edit-unit-display").textContent =
          `[UNITÉ ${String(id).padStart(2, "0")}]`;

        if (type === "status") {
          document.getElementById("edit-modal-title-type").textContent =
            "STATUT";
          document.getElementById("edit-status-group").style.display = "block";
          document.getElementById("edit-radio-group").style.display = "none";
          document.getElementById("edit-status").value = patrol.status;
        } else {
          document.getElementById("edit-modal-title-type").textContent =
            "RADIO";
          document.getElementById("edit-status-group").style.display = "none";
          document.getElementById("edit-radio-group").style.display = "block";
          document.getElementById("edit-radio").value = patrol.radio;
        }

        document.getElementById("edit-modal").style.display = "flex";
      }

      function closeEditModal() {
        document.getElementById("edit-modal").style.display = "none";
        currentEditId = null;
        currentEditType = null;
      }

      async function saveEdit() {
        const patrol = activePatrols.find((p) => p.id === currentEditId);
        if (patrol) {
          if (currentEditType === "status") {
            patrol.status = document.getElementById("edit-status").value;
            await supabaseClient
              .from("patrouilles")
              .update({ statut: patrol.status })
              .eq("id", patrol.id);
          } else if (currentEditType === "radio") {
            patrol.radio = document.getElementById("edit-radio").value;
            await supabaseClient
              .from("patrouilles")
              .update({ frequence_radio: parseInt(patrol.radio) })
              .eq("id", patrol.id);
          }
          updateUI();
        }
        closeEditModal();
      }

      // ═══════════════════════════════════════════════
      //  CLÔTURE DE PATROUILLE
      // ═══════════════════════════════════════════════

      function openCloseModal(id) {
        currentClosingId = id;
        document.getElementById("close-modal").style.display = "flex";
      }

      function closeModal() {
        document.getElementById("close-modal").style.display = "none";
        document.getElementById("patrol-report").value = "";
      }

      async function archivePatrol() {
        const report = document.getElementById("patrol-report").value;
        if (!report) return alert("Rapport obligatoire");

        const index = activePatrols.findIndex((p) => p.id === currentClosingId);
        const patrol = activePatrols[index];
        const now = new Date();
        const endDateStr =
          now.toLocaleDateString("fr-FR") +
          " - " +
          now.toLocaleTimeString("fr-FR", {
            hour: "2-digit",
            minute: "2-digit",
          });
        const interventionValue = document.getElementById(
          "intervention-confirm",
        ).value;

        const { error } = await supabaseClient
          .from("patrouilles")
          .update({
            date_cloture: now.toISOString(),
            intervention_effectuee: interventionValue === "Oui",
            rapport: report,
            statut: "Archivé",
          })
          .eq("id", currentClosingId);

        if (error) {
          console.error("Erreur archivage :", error.message);
          return;
        }

        archive.unshift({
          ...patrol,
          endDate: endDateStr,
          report: report,
          intervention: interventionValue,
        });

        activePatrols.splice(index, 1);
        updateHistoryUI();
        updateUI();
        closeModal();
      }

      // ═══════════════════════════════════════════════
      //  HISTORIQUE
      // ═══════════════════════════════════════════════

      function updateHistoryUI() {
        const log = document.getElementById("history-log");
        log.innerHTML = "";

        if (archive.length === 0) {
          log.innerHTML = `<tr><td colspan="5" class="empty-state-table">Aucune archive récente dans la base de données.</td></tr>`;
          return;
        }

        archive.slice(0, 10).forEach((item) => {
          const tr = document.createElement("tr");

          const agentsHtml = item.agents
            .map((a) => {
              const isSup = a.id === item.supervisor.id;
              const supIcon = isSup
                ? '<span style="margin-right:4px; opacity:0.8;">★</span>'
                : "";
              return `<div class="tag ${a.grade.class}">${supIcon}${a.matricule} | ${a.name} ${specialtyBadge(a.specialty)}</div>`;
            })
            .join("");

          const interventionColor =
            item.intervention === "Oui" ? "#10b981" : "#ef4444";

          tr.innerHTML = `
            <td><div class="tags-container" style="gap: 4px;">${agentsHtml}</div></td>
            <td style="color: var(--text-muted); font-size: 0.85rem;">${item.date}</td>
            <td style="color: var(--text-muted); font-size: 0.85rem;">${item.endDate}</td>
            <td><strong style="color: ${interventionColor};">${item.intervention}</strong></td>
            <td style="font-size: 0.85rem; color: var(--text-muted); max-width: 300px;">"${item.report}"</td>`;
          log.appendChild(tr);
        });
      }

      // ═══════════════════════════════════════════════
      //  SPÉCIALITÉS
      // ═══════════════════════════════════════════════

      function openSpecialtyModal(patrolId, agentId) {
        currentSpecPatrolId = patrolId;
        currentSpecAgentId = agentId;
        const patrol = activePatrols.find((p) => p.id === patrolId);
        const agent = patrol.agents.find((a) => a.id === agentId);
        document.getElementById("spec-agent-name").textContent =
          `${agent.matricule} | ${agent.name}`;
        document.getElementById("spec-select").value = agent.specialty || "";
        document.getElementById("specialty-modal").style.display = "flex";
      }

      function closeSpecialtyModal() {
        document.getElementById("specialty-modal").style.display = "none";
        currentSpecPatrolId = null;
        currentSpecAgentId = null;
      }

      async function saveSpecialty() {
        const patrol = activePatrols.find((p) => p.id === currentSpecPatrolId);
        if (patrol) {
          const agent = patrol.agents.find((a) => a.id === currentSpecAgentId);
          if (agent) {
            const newSpec =
              document.getElementById("spec-select").value || null;
            agent.specialty = newSpec;
            if (patrol.supervisor.id === agent.id)
              patrol.supervisor.specialty = newSpec;

            await supabaseClient
              .from("patrouille_agents")
              .update({ specialite_active: newSpec })
              .eq("patrouille_id", patrol.id)
              .eq("agent_id", agent.id);

            updateUI();
          }
        }
        closeSpecialtyModal();
      }
      // ═══════════════════════════════════════════════
      //  DIVERS
      // ═══════════════════════════════════════════════

      document.addEventListener("click", function (e) {
        if (e.target !== searchInput && !searchResults.contains(e.target)) {
          searchResults.style.display = "none";
        }
      });

      const realtimeChannel = supabaseClient
        .channel("public:patrouilles")
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "patrouilles" },
          (payload) => {
            refreshDataSilently();
          },
        )
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "patrouille_agents" },
          (payload) => {
            refreshDataSilently();
          },
        )
        .subscribe();

      async function refreshDataSilently() {
        await loadActivePatrols();
        await loadHistory();
        updateUI();
        updateHistoryUI();
      }

      // ═══════════════════════════════════════════════
      //  INITIALISATION
      // ═══════════════════════════════════════════════

      async function init() {
        await loadRoster();
        await loadActivePatrols();
        await loadHistory();
        updateUI();
        updateHistoryUI();
      }

      fetch("header.html")
        .then((r) => r.text())
        .then((data) => {
          document.getElementById("header-placeholder").innerHTML = data;
          const currentPath = window.location.pathname.split("/").pop();
          document.querySelectorAll(".nav-item").forEach((link) => {
            if (
              link.getAttribute("href") === currentPath ||
              (currentPath === "" && link.getAttribute("href") === "index.html")
            ) {
              link.classList.add("active");
            }
          });
        });

      fetch("footer.html")
        .then((r) => r.text())
        .then((data) => {
          document.getElementById("footer-placeholder").innerHTML = data;
        });

      init();
    </script>
  </body>
</html>
